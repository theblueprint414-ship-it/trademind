name: Build EdgeBridge

on:
  push:
    tags:
      - "edgebridge-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.1)"
        required: true

permissions:
  contents: read

jobs:
  build-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts && npx electron-builder install-app-deps

      - name: Build macOS arm64 DMG
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac -- --arm64

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgebridge-mac-arm64
          retention-days: 30
          path: |
            desktop/release/*arm64.dmg
            desktop/release/*arm64.dmg.blockmap
            desktop/release/latest-mac.yml

  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts && npx electron-builder install-app-deps

      - name: Build macOS x64 DMG
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac -- --x64

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgebridge-mac-x64
          retention-days: 30
          path: |
            desktop/release/*.dmg
            desktop/release/*.dmg.blockmap

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts && npx electron-builder install-app-deps

      - name: Build Windows installer
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgebridge-windows
          retention-days: 30
          path: |
            desktop/release/*.exe
            desktop/release/*.exe.blockmap
            desktop/release/latest.yml