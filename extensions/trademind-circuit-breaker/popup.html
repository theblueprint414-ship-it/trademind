<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TradeMind Circuit Breaker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070B14;
      --surface: #0D1420;
      --border: #1E2D45;
      --text: #E8F0FF;
      --muted: #3D4F6A;
      --blue: #4F8EF7;
      --green: #00E87A;
      --yellow: #FFB547;
      --red: #FF3B5C;
    }
    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 32px; height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-text { flex: 1; }
    .header-title { font-size: 13px; font-weight: 700; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.blocked { background: var(--red); box-shadow: 0 0 6px var(--red); }

    /* Setup state */
    #setup-view { padding: 20px 16px; }
    .setup-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .setup-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      margin-bottom: 16px;
    }
    input[type="text"]:focus { border-color: var(--blue); }
    input[type="text"]::placeholder { color: var(--muted); }

    /* Status view */
    #status-view { display: none; }
    .status-block {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .verdict-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.1em;
      padding: 4px 10px; border-radius: 20px; margin-bottom: 14px;
    }
    .verdict-badge.go { background: rgba(0,232,122,0.12); color: var(--green); border: 1px solid rgba(0,232,122,0.3); }
    .verdict-badge.caution { background: rgba(255,181,71,0.12); color: var(--yellow); border: 1px solid rgba(255,181,71,0.3); }
    .verdict-badge.no-trade, .verdict-badge.blocked { background: rgba(255,59,92,0.12); color: var(--red); border: 1px solid rgba(255,59,92,0.3); }

    .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .progress-count { font-size: 13px; font-weight: 700; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }

    .stats-row { display: flex; gap: 8px; margin-top: 14px; }
    .stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; text-align: center; }
    .stat-val { font-size: 20px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
    .stat-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }

    .blocked-banner {
      margin: 12px 0 0;
      padding: 12px;
      background: rgba(255,59,92,0.08);
      border: 1px solid rgba(255,59,92,0.25);
      border-radius: 10px;
      font-size: 12px;
      color: var(--red);
      line-height: 1.5;
      text-align: center;
    }

    /* Actions */
    .actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(255,59,92,0.3); }

    /* Footer */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-time { font-size: 10px; color: var(--muted); }
    .footer-link { font-size: 11px; color: var(--blue); text-decoration: none; cursor: pointer; }
    .footer-link:hover { text-decoration: underline; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 22l5.5-7 4.5 4.5 7-12.5 5 6.5" stroke="#4F8EF7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 25h20" stroke="#4F8EF7" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="22" cy="6" r="5" fill="#070B14" stroke="#FF3B5C" stroke-width="1.8"/>
        <path d="M20.5 6h3M22 4.5v3" stroke="#FF3B5C" stroke-width="1.5" stroke-linecap="round" transform="rotate(45 22 6)"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="header-title">Circuit Breaker</div>
      <div class="header-sub" id="header-sub">Not connected</div>
    </div>
    <div class="status-dot" id="status-dot"></div>
  </div>

  <!-- Setup view (no token) -->
  <div id="setup-view">
    <div class="setup-title">Connect to TradeMind</div>
    <div class="setup-sub">Paste your extension token from Settings → Circuit Breaker in your TradeMind dashboard.</div>
    <label>EXTENSION TOKEN</label>
    <input type="text" id="token-input" placeholder="tm_xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" spellcheck="false">
    <button class="btn-primary" id="save-token-btn">Connect</button>
  </div>

  <!-- Status view (has token) -->
  <div id="status-view">
    <div class="status-block">
      <div id="verdict-badge" class="verdict-badge go">
        <span id="verdict-text">GO</span>
      </div>

      <div class="progress-row">
        <span class="progress-label">TRADES TODAY</span>
        <span class="progress-count" id="trade-count-text">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%; background: #00E87A;"></div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-val" id="stat-done">0</div>
          <div class="stat-label">Done</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-remaining">—</div>
          <div class="stat-label">Left</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-limit">—</div>
          <div class="stat-label">Limit</div>
        </div>
      </div>

      <div class="blocked-banner" id="blocked-banner" style="display:none">
        Circuit breaker is <strong>active</strong>. Trading platforms are blocked.
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="refresh-btn">Refresh Status</button>
      <button class="btn-ghost" id="dashboard-btn">Open Dashboard</button>
      <button class="btn-ghost" id="disconnect-btn">Disconnect Token</button>
    </div>
  </div>

  <div class="footer">
    <span class="footer-time" id="last-poll">Never synced</span>
    <span class="footer-link" id="settings-link" style="display:none">Settings</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
