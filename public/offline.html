<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>TradeMind — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070B14;
      --surface: #0D1420;
      --border: #1E2D45;
      --text: #E8F0FF;
      --text-muted: #3D4F6A;
      --blue: #4F8EF7;
      --green: #00E87A;
      --red: #FF3B5C;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      min-height: 100svh;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      line-height: 1.1;
    }
    p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 320px;
      margin: 0 auto 36px;
    }
    .btn {
      display: inline-block;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 36px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .tip {
      margin-top: 40px;
      padding: 16px 20px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      max-width: 340px;
    }
    .tip-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--blue);
      margin-bottom: 8px;
    }
    .tip p {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 28l7-9 6 6 9-16 7 9" stroke="#4F8EF7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6 32h24" stroke="#4F8EF7" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="28" cy="8" r="6" fill="#070B14" stroke="#FF3B5C" stroke-width="2"/>
      <path d="M26 8h4M28 6v4" stroke="#FF3B5C" stroke-width="1.8" stroke-linecap="round" transform="rotate(45 28 8)"/>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>No internet connection right now. Your recent data is cached — reconnect to sync and access the full dashboard.</p>

  <button class="btn" id="try-btn" onclick="tryAgain()">Try again</button>

  <div class="tip">
    <div class="tip-label">WHILE YOU WAIT</div>
    <p>Journal your thoughts or review your trading rules — the mental edge starts before the market opens.</p>
  </div>

  <script>
    async function clearSWAndGo() {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function(r) { return r.unregister(); }));
      }
      window.location.href = document.referrer || '/dashboard';
    }

    async function tryAgain() {
      var btn = document.getElementById('try-btn');
      btn.textContent = 'Reconnecting…';
      btn.style.opacity = '0.7';
      // Probe the network — if we get a response we're actually online
      try {
        await fetch('/api/me', { method: 'HEAD', cache: 'no-store' });
        await clearSWAndGo();
      } catch (_) {
        // Truly offline — just reload
        window.location.reload();
      }
    }

    // Auto-fix on load if navigator says we're online (SW false-positive)
    if (navigator.onLine) {
      clearSWAndGo();
    }
  </script>
</body>
</html>
