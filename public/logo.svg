<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Background -->
  <rect width="220" height="48" fill="#070B14"/>

  <!-- Icon container: rounded square -->
  <rect x="8" y="6" width="36" height="36" rx="8" fill="#0D1420" stroke="#1E2D45" stroke-width="1"/>

  <!-- Neural pulse / EKG mark — minimal, clean -->
  <path d="M14,26 L19,26 L22,15 L25,32 L28,26 L38,26"
        stroke="url(#pulseGrad)" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark: TRADE white -->
  <text x="56" y="31"
        font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif"
        font-size="24" letter-spacing="2" fill="#E8F0FF">TRADE</text>

  <!-- Red accent dot (brand element) -->
  <circle cx="139" cy="24" r="3" fill="#FF3B5C"/>
  <circle cx="139" cy="24" r="5.5" fill="#FF3B5C" opacity="0.15"/>

  <!-- Wordmark: MIND with gradient -->
  <text x="148" y="31"
        font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif"
        font-size="24" letter-spacing="2" fill="url(#mindGrad)">MIND</text>

  <defs>
    <linearGradient id="pulseGrad" x1="14" y1="26" x2="38" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="55%" stop-color="#9D6FFF"/>
      <stop offset="100%" stop-color="#FF3B5C"/>
    </linearGradient>
    <linearGradient id="mindGrad" x1="148" y1="0" x2="210" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF3B5C"/>
      <stop offset="100%" stop-color="#FFB020"/>
    </linearGradient>
  </defs>
</svg>
