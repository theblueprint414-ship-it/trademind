<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeBridge Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0F14;
      --surface: #151820;
      --surface2: #1C2030;
      --border: rgba(255,255,255,0.08);
      --text: #F0F2F8;
      --text-dim: #8B93A8;
      --text-muted: #525869;
      --blue: #3B82F6;
      --green: #00E87A;
      --red: #FF3B5C;
      --amber: #F59E0B;
      --radius: 10px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; -webkit-font-smoothing: antialiased; }

    body { display: flex; flex-direction: column; }

    /* Title bar drag region (macOS hiddenInset) */
    .titlebar { -webkit-app-region: drag; height: 28px; background: var(--bg); flex-shrink: 0; }

    .container { flex: 1; overflow-y: auto; padding: 0 20px 24px; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; padding: 16px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .logo { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, #3B82F6, #6366F1); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .header h1 { font-size: 17px; font-weight: 800; }
    .header p { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    /* Status bar */
    .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); margin-bottom: 20px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.ok { background: var(--green); box-shadow: 0 0 6px rgba(0,232,122,0.5); }
    .status-dot.error { background: var(--red); }
    .status-dot.idle { background: var(--text-muted); }
    .status-text { font-size: 12px; color: var(--text-dim); flex: 1; }
    .btn-sync { padding: 5px 12px; border-radius: 6px; border: none; background: var(--blue); color: #fff; font-size: 11px; font-weight: 700; cursor: pointer; -webkit-app-region: no-drag; }
    .btn-sync:disabled { opacity: 0.5; cursor: default; }

    /* Section */
    .section { margin-bottom: 18px; }
    .section-title { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .card + .card { margin-top: 8px; }

    /* Form fields */
    label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; }
    input[type="text"], input[type="password"], input[type="url"], input[type="number"] {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      padding: 8px 10px; font-size: 12px; color: var(--text); outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: rgba(59,130,246,0.5); }
    input::placeholder { color: var(--text-muted); }

    /* Toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; }
    .toggle-label { font-size: 12px; color: var(--text); }
    .toggle { position: relative; width: 38px; height: 22px; cursor: pointer; -webkit-app-region: no-drag; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; transition: background 0.2s; }
    .toggle-slider:before { content: ""; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px; background: var(--text-muted); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .toggle input:checked + .toggle-slider { background: rgba(59,130,246,0.25); border-color: rgba(59,130,246,0.4); }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); background: var(--blue); }

    /* Broker rows */
    .broker-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .broker-row:last-child { border-bottom: none; padding-bottom: 0; }
    .broker-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
    .broker-info { flex: 1; }
    .broker-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .broker-desc { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
    .broker-path-row { display: flex; gap: 6px; margin-top: 8px; }
    .broker-path-row input { flex: 1; }
    .btn-browse { padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 11px; cursor: pointer; white-space: nowrap; -webkit-app-region: no-drag; }
    .btn-browse:hover { border-color: rgba(59,130,246,0.4); color: var(--text); }

    /* Buttons */
    .btn-primary { width: 100%; padding: 11px; border-radius: 9px; border: none; background: var(--blue); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; -webkit-app-region: no-drag; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .btn-ghost { width: 100%; padding: 9px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 12px; cursor: pointer; -webkit-app-region: no-drag; }

    /* Toast */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 10px 18px; font-size: 12px; font-weight: 600; color: var(--text); opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .toast.ok { border-color: rgba(0,232,122,0.3); color: var(--green); }
    .toast.error { border-color: rgba(255,59,92,0.3); color: var(--red); }

    /* Log */
    .log { font-size: 10px; color: var(--text-muted); font-family: monospace; max-height: 80px; overflow-y: auto; background: var(--surface2); border-radius: 6px; padding: 8px; }
    .log-entry { margin-bottom: 3px; }
    .log-entry.ok { color: var(--green); }
    .log-entry.err { color: var(--red); }
  </style>
</head>
<body>
  <div class="titlebar"></div>

  <div class="container">
    <div class="header">
      <div class="logo">🌉</div>
      <div>
        <h1>EdgeBridge</h1>
        <p>Real-time trade sync for TradeMind</p>
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div class="status-dot idle" id="statusDot"></div>
      <span class="status-text" id="statusText">Checking connection...</span>
      <button class="btn-sync" id="syncBtn">Sync Now</button>
    </div>

    <!-- Token -->
    <div class="section">
      <div class="section-title">API Connection</div>
      <div class="card">
        <label for="apiToken">TradeMind API Token</label>
        <input type="password" id="apiToken" placeholder="Paste your token from TradeMind → Settings → EdgeBridge" autocomplete="off" />
        <div style="margin-top:10px;">
          <label for="deviceName">Device Name</label>
          <input type="text" id="deviceName" placeholder="e.g. Trading PC" maxlength="60" />
        </div>
      </div>
    </div>

    <!-- Brokers -->
    <div class="section">
      <div class="section-title">Connected Platforms</div>
      <div class="card" id="brokersCard">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Options -->
    <div class="section">
      <div class="section-title">Options</div>
      <div class="card">
        <div class="toggle-row" style="margin-bottom:10px;">
          <span class="toggle-label">Launch at login</span>
          <label class="toggle"><input type="checkbox" id="launchAtLogin" /><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label" style="font-size:11px;color:var(--text-dim);">Sync interval</span>
          <select id="syncInterval" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:11px;cursor:pointer;">
            <option value="15000">Every 15s</option>
            <option value="30000" selected>Every 30s</option>
            <option value="60000">Every 1m</option>
            <option value="120000">Every 2m</option>
            <option value="300000">Every 5m</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Sync log -->
    <div class="section">
      <div class="section-title">Sync Log</div>
      <div class="log" id="syncLog"><div class="log-entry">Waiting for activity...</div></div>
    </div>

    <button class="btn-primary" id="saveBtn" style="margin-bottom:8px;">Save Settings</button>
    <button class="btn-ghost" id="openDashBtn">Open TradeMind Dashboard ↗</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const api = window.edgeBridge;
    let settings = null;

    const BROKERS = [
      { type: "mt4", name: "MetaTrader 4", icon: "📊", desc: "Watch folder where TradeMindBridge EA writes CSV files" },
      { type: "mt5", name: "MetaTrader 5", icon: "📈", desc: "Watch folder where TradeMindBridge EA writes CSV files" },
      { type: "ninjatrader", name: "NinjaTrader 8", icon: "🥷", desc: "Path to NinjaTrader.db3 database file" },
      { type: "tradovate", name: "Tradovate", icon: "⚡", desc: "Folder where you save Tradovate CSV exports" },
      { type: "csv", name: "Any Platform (CSV)", icon: "📄", desc: "Watch a folder for CSV trade exports" },
    ];

    function renderBrokers() {
      const card = document.getElementById("brokersCard");
      card.innerHTML = "";
      BROKERS.forEach(b => {
        const cfg = settings.brokers?.find(x => x.type === b.type) || { type: b.type, enabled: false, watchPath: "" };
        const div = document.createElement("div");
        div.className = "broker-row";
        div.innerHTML = `
          <span class="broker-icon">${b.icon}</span>
          <div class="broker-info">
            <div class="broker-name">${b.name}</div>
            <div class="broker-desc">${b.desc}</div>
            ${cfg.enabled ? `<div class="broker-path-row">
              <input type="text" id="path_${b.type}" value="${cfg.watchPath || ""}" placeholder="Select path..." readonly />
              <button class="btn-browse" data-type="${b.type}">Browse</button>
            </div>` : ""}
          </div>
          <label class="toggle">
            <input type="checkbox" data-broker="${b.type}" ${cfg.enabled ? "checked" : ""} />
            <span class="toggle-slider"></span>
          </label>
        `;
        card.appendChild(div);
      });

      // Toggle events
      card.querySelectorAll("input[data-broker]").forEach(el => {
        el.addEventListener("change", (e) => {
          const type = e.target.dataset.broker;
          const enabled = e.target.checked;
          const broker = settings.brokers.find(b => b.type === type);
          if (broker) broker.enabled = enabled;
          renderBrokers();
        });
      });

      // Browse events
      card.querySelectorAll(".btn-browse").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const type = e.currentTarget.dataset.type;
          const title = type === "ninjatrader" ? "Select NinjaTrader.db3" : "Select Watch Folder";
          const selected = await api.browsePath(title);
          if (selected) {
            const broker = settings.brokers.find(b => b.type === type);
            if (broker) broker.watchPath = selected;
            const inp = document.getElementById("path_" + type);
            if (inp) inp.value = selected;
          }
        });
      });
    }

    async function init() {
      settings = await api.getSettings();
      document.getElementById("apiToken").value = settings.apiToken || "";
      document.getElementById("deviceName").value = settings.deviceName || "";
      document.getElementById("launchAtLogin").checked = settings.launchAtLogin ?? true;
      document.getElementById("syncInterval").value = String(settings.syncIntervalMs || 30000);

      if (!settings.brokers) settings.brokers = BROKERS.map(b => ({ type: b.type, enabled: false, watchPath: "" }));
      renderBrokers();

      // Sync status
      const status = await api.getSyncStatus();
      updateStatus(status);
    }

    function updateStatus(status) {
      const dot = document.getElementById("statusDot");
      const text = document.getElementById("statusText");
      dot.className = "status-dot " + (status.ok ? "ok" : "error");
      text.textContent = status.lastAt
        ? `Last sync: ${new Date(status.lastAt).toLocaleTimeString()} · ${status.tradesTotal} trades total`
        : (status.message || "Ready to sync");
    }

    function addLog(msg, type = "") {
      const log = document.getElementById("syncLog");
      const el = document.createElement("div");
      el.className = "log-entry " + type;
      el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      log.insertBefore(el, log.firstChild);
      if (log.children.length > 50) log.lastChild.remove();
    }

    function showToast(msg, type = "") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast show " + type;
      setTimeout(() => { t.className = "toast"; }, 2500);
    }

    // Save
    document.getElementById("saveBtn").addEventListener("click", async () => {
      const btn = document.getElementById("saveBtn");
      btn.disabled = true;
      btn.textContent = "Saving...";

      // Collect path inputs back into settings
      settings.brokers.forEach(b => {
        const inp = document.getElementById("path_" + b.type);
        if (inp) b.watchPath = inp.value;
      });

      const result = await api.saveSettings({
        apiToken: document.getElementById("apiToken").value.trim(),
        deviceName: document.getElementById("deviceName").value.trim(),
        launchAtLogin: document.getElementById("launchAtLogin").checked,
        syncIntervalMs: parseInt(document.getElementById("syncInterval").value),
        brokers: settings.brokers,
      });

      btn.disabled = false;
      btn.textContent = "Save Settings";

      if (result.ok) showToast("Settings saved", "ok");
      else showToast("Error: " + result.error, "error");
    });

    // Sync now
    document.getElementById("syncBtn").addEventListener("click", async () => {
      const btn = document.getElementById("syncBtn");
      btn.disabled = true;
      btn.textContent = "Syncing...";
      const status = await api.syncNow();
      updateStatus(status);
      btn.disabled = false;
      btn.textContent = "Sync Now";
    });

    // Open dashboard
    document.getElementById("openDashBtn").addEventListener("click", () => {
      window.open("https://trademindedge.com/dashboard");
    });

    // IPC events
    api.onSyncSuccess(data => {
      updateStatus({ ok: true, lastAt: new Date().toISOString(), tradesTotal: data.created });
      if (data.created > 0) addLog(`✓ ${data.created} new, ${data.updated} updated`, "ok");
    });
    api.onSyncError(data => {
      addLog(`✗ ${data.broker}: ${data.message}`, "err");
    });
    api.onSyncStatus(data => {
      document.getElementById("statusText").textContent = data.message || "";
    });

    init();
  </script>
</body>
</html>
